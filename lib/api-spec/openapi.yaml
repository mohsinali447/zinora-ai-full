openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Zinora AI - AI Customer Support Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: dashboard
    description: Dashboard summary
  - name: conversations
    description: Conversation management
  - name: messages
    description: Message management
  - name: knowledge
    description: Knowledge base
  - name: analytics
    description: Analytics and metrics
  - name: team
    description: Team management
  - name: billing
    description: Billing and subscriptions
  - name: notifications
    description: Notifications
  - name: ai-settings
    description: AI configuration
  - name: integrations
    description: Third-party integrations
  - name: contact
    description: Contact form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update conversation status/tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /knowledge/articles:
    get:
      operationId: listArticles
      tags: [knowledge]
      summary: List knowledge base articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [knowledge]
      summary: Create article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /knowledge/articles/{id}:
    get:
      operationId: getArticle
      tags: [knowledge]
      summary: Get article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    patch:
      operationId: updateArticle
      tags: [knowledge]
      summary: Update article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [knowledge]
      summary: Delete article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /knowledge/categories:
    get:
      operationId: listCategories
      tags: [knowledge]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get analytics overview
      parameters:
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /analytics/charts:
    get:
      operationId: getAnalyticsCharts
      tags: [analytics]
      summary: Get chart data
      parameters:
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsCharts"

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInviteInput"
      responses:
        "201":
          description: Invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/members/{id}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update team member role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /billing/plans:
    get:
      operationId: listPlans
      tags: [billing]
      summary: List available plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /billing/invoices:
    get:
      operationId: listInvoices
      tags: [billing]
      summary: List invoices
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications read
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /ai-settings:
    get:
      operationId: getAiSettings
      tags: [ai-settings]
      summary: Get AI settings
      responses:
        "200":
          description: AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
    patch:
      operationId: updateAiSettings
      tags: [ai-settings]
      summary: Update AI settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List integrations
      responses:
        "200":
          description: Integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"

  /integrations/{id}/connect:
    post:
      operationId: connectIntegration
      tags: [integrations]
      summary: Connect an integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}/disconnect:
    post:
      operationId: disconnectIntegration
      tags: [integrations]
      summary: Disconnect an integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    SignupInput:
      type: object
      required: [name, email, password, company]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        company:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, company, plan, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        company:
          type: string
        plan:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
        avatarUrl:
          type: ["string", "null"]

    DashboardSummary:
      type: object
      required: [totalConversations, resolvedToday, activeChats, avgResponseTime, satisfactionScore, aiResolutionRate, weeklyGrowth]
      properties:
        totalConversations:
          type: integer
        resolvedToday:
          type: integer
        activeChats:
          type: integer
        avgResponseTime:
          type: string
        satisfactionScore:
          type: number
        aiResolutionRate:
          type: number
        weeklyGrowth:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
        user:
          type: ["string", "null"]

    Conversation:
      type: object
      required: [id, customerName, customerEmail, subject, status, lastMessage, lastMessageAt, tags, channel, assignedTo, unreadCount, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        subject:
          type: string
        status:
          type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
        tags:
          type: array
          items:
            type: string
        channel:
          type: string
        assignedTo:
          type: ["string", "null"]
        unreadCount:
          type: integer
        createdAt:
          type: string

    ConversationInput:
      type: object
      required: [customerName, customerEmail, subject, channel]
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        subject:
          type: string
        channel:
          type: string

    ConversationUpdate:
      type: object
      properties:
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        assignedTo:
          type: ["string", "null"]

    Message:
      type: object
      required: [id, conversationId, content, sender, senderType, timestamp, isAi]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        content:
          type: string
        sender:
          type: string
        senderType:
          type: string
        timestamp:
          type: string
        isAi:
          type: boolean
        attachments:
          type: array
          items:
            type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        attachments:
          type: array
          items:
            type: string

    Article:
      type: object
      required: [id, title, content, category, tags, status, views, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
        views:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    ArticleInput:
      type: object
      required: [title, content, category]
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string

    ArticleUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string

    Category:
      type: object
      required: [id, name, slug, articleCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        articleCount:
          type: integer

    AnalyticsOverview:
      type: object
      required: [totalTickets, resolvedTickets, avgSatisfaction, avgResponseTime, aiResolutionRate, ticketsByChannel, ticketsByStatus]
      properties:
        totalTickets:
          type: integer
        resolvedTickets:
          type: integer
        avgSatisfaction:
          type: number
        avgResponseTime:
          type: number
        aiResolutionRate:
          type: number
        ticketsByChannel:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        ticketsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"

    AnalyticsCharts:
      type: object
      required: [dailyConversations, satisfactionTrend, responseTimeTrend, teamPerformance]
      properties:
        dailyConversations:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        satisfactionTrend:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        responseTimeTrend:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"
        teamPerformance:
          type: array
          items:
            $ref: "#/components/schemas/TeamPerformancePoint"

    ChartDataPoint:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: number

    TimeSeriesPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number

    TeamPerformancePoint:
      type: object
      required: [name, resolved, avgTime, satisfaction]
      properties:
        name:
          type: string
        resolved:
          type: integer
        avgTime:
          type: number
        satisfaction:
          type: number

    TeamMember:
      type: object
      required: [id, name, email, role, status, joinedAt, conversationsHandled]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        joinedAt:
          type: string
        conversationsHandled:
          type: integer
        avatarUrl:
          type: ["string", "null"]

    TeamInviteInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
        role:
          type: string
        name:
          type: string

    TeamMemberUpdate:
      type: object
      properties:
        role:
          type: string
        status:
          type: string

    Subscription:
      type: object
      required: [planId, planName, status, currentPeriodStart, currentPeriodEnd, aiCreditsUsed, aiCreditsLimit, seatsUsed, seatsLimit]
      properties:
        planId:
          type: string
        planName:
          type: string
        status:
          type: string
        currentPeriodStart:
          type: string
        currentPeriodEnd:
          type: string
        aiCreditsUsed:
          type: integer
        aiCreditsLimit:
          type: integer
        seatsUsed:
          type: integer
        seatsLimit:
          type: integer

    Plan:
      type: object
      required: [id, name, price, yearlyPrice, description, features, isPopular, aiCredits, seats]
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        yearlyPrice:
          type: number
        description:
          type: string
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
        aiCredits:
          type: integer
        seats:
          type: integer

    Invoice:
      type: object
      required: [id, amount, status, date, description, downloadUrl]
      properties:
        id:
          type: string
        amount:
          type: number
        status:
          type: string
        date:
          type: string
        description:
          type: string
        downloadUrl:
          type: string

    Notification:
      type: object
      required: [id, type, title, message, isRead, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string

    AiSettings:
      type: object
      required: [id, personality, responseTone, model, language, confidenceThreshold, autoEscalate, autoEscalateThreshold, maxResponseLength, enableSentimentAnalysis, enableAutoReply, workingHoursOnly]
      properties:
        id:
          type: integer
        personality:
          type: string
        responseTone:
          type: string
        model:
          type: string
        language:
          type: string
        confidenceThreshold:
          type: number
        autoEscalate:
          type: boolean
        autoEscalateThreshold:
          type: number
        maxResponseLength:
          type: integer
        enableSentimentAnalysis:
          type: boolean
        enableAutoReply:
          type: boolean
        workingHoursOnly:
          type: boolean

    AiSettingsUpdate:
      type: object
      properties:
        personality:
          type: string
        responseTone:
          type: string
        model:
          type: string
        language:
          type: string
        confidenceThreshold:
          type: number
        autoEscalate:
